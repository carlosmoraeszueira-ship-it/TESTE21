/* ── CONTRATO LEGAL ────────────────────────── */
const TRC = {
  v:"2026.01", norm:"Lei 15.270/2025",
  a6:  { lim:50000,  aliq:0.10 },
  a16: { lz:600000, lf:1200000, af:0.10, div:60000, k:10 },
  a16b:{ limites:{geral:0.34,financeira_seguro:0.40,banco:0.45}, tipoLabels:{geral:"Geral 34%",financeira_seguro:"Financeira 40%",banco:"Banco 45%"} }
};

const TAX = {
  DIV_FECHADA:      {n:"Dividendo PJ fechada",    g:"Dividendos",eR:true, bM:true, i6A:true, inc:"par5",  c:false},

  GCAP:             {n:"Ganho de capital geral",  g:"Especial",  eR:true, bM:true, i6A:false,inc:"incII", c:false},
  GC_BOLSA:         {n:"Ganho em bolsa",          g:"Especial",  eR:true, bM:false,i6A:false,inc:null,    c:false},
  SALARIO:          {n:"Salário / CLT",           g:"Trabalho",  eR:true, bM:true, i6A:false,inc:"incI",  c:false},
  PROLABORE:        {n:"Pró-labore",              g:"Trabalho",  eR:true, bM:true, i6A:false,inc:"incI",  c:false},
  ALUGUEL_PJ:       {n:"Aluguel de PJ",           g:"Trabalho",  eR:true, bM:true, i6A:false,inc:"incI",  c:false},
  ALUGUEL_PF:       {n:"Aluguel de PF",           g:"Trabalho",  eR:true, bM:true, i6A:false,inc:null,    c:false},
  CARNE_LEAO:       {n:"Carnê-leão pago",         g:"Ajuste",    eR:false,bM:false,i6A:false,inc:"daa",   c:false},
  IRPF_LEI14754:    {n:"IR Lei 14.754/2023",      g:"Crédito",   eR:false,bM:false,i6A:false,inc:"incIII",c:false},
};

/* ── MOTOR ─────────────────────────────────── */
function calcMotor6A(lans) {
  const ac={}, res={};
  [...lans].filter(l=>TAX[l.cod]?.i6A&&!l.grandfathering)
    .sort((a,b)=>a.data===b.data?(a.seq||0)-(b.seq||0):a.data.localeCompare(b.data))
    .forEach(ev=>{
      const mes=ev.data.slice(0,7), k=`${ev.cnpj}__${mes}`;
      if(!ac[k]) ac[k]={tot:0,iAc:0};
      ac[k].tot+=ev.valorBruto;
      const sup=ac[k].tot>TRC.a6.lim, iT=sup?ac[k].tot*TRC.a6.aliq:0, iEv=Math.max(0,iT-ac[k].iAc);
      ac[k].iAc=iT;
      res[ev.id]={dep:ac[k].tot,mes,cnpj:ev.cnpj,nome:ev.nome,sup,iT,iEv};
    });
  return res;
}
function calcBase(lans) {
  const evs=[],excl=[],pend=[];let bB=0;
  lans.forEach(l=>{
    const t=TAX[l.cod];
    if(!t){pend.push({id:l.id,nome:l.nome||l.cod,m:"Não classificado"});return;}
    if(!t.eR)return;
    bB+=l.valorBruto;
    if(l.grandfathering){excl.push({id:l.id,v:l.valorBruto,m:"Grandfathering",cod:l.cod});return;}
    if(t.c){if(l.requisitosIsencao===true)excl.push({id:l.id,v:l.valorBruto,m:"FII/Fiagro isento",cod:l.cod});
      else{pend.push({id:l.id,nome:l.nome,m:"Requisitos FII/Fiagro não confirmados"});evs.push({...l});}return;}
    t.bM?evs.push({...l}):excl.push({id:l.id,v:l.valorBruto,m:"Exclusão legal",cod:l.cod});
  });
  return {bM:evs.reduce((s,e)=>s+e.valorBruto,0),bB,excl,pend};
}
function calcAliq(b){if(b<=TRC.a16.lz)return 0;if(b>=TRC.a16.lf)return TRC.a16.af;return(b/TRC.a16.div-TRC.a16.k)/100;}
function calcRedutores(lans,bM,tMB,pjData){
  const divPJ={};
  lans.forEach(l=>{if((l.cod!=="DIV_FECHADA"&&l.cod!=="DIV_ABERTA")||l.grandfathering||!TAX[l.cod]?.bM)return;if(!divPJ[l.cnpj])divPJ[l.cnpj]={nome:l.nome,total:0};divPJ[l.cnpj].total+=l.valorBruto;});
  return Object.entries(divPJ).map(([cnpj,{nome,total}])=>{
    const pd=(pjData||{})[cnpj]||{},{irpjCsll,lucroContabil,tipoPJ="geral"}=pd;
    const pend=irpjCsll==null||lucroContabil==null||lucroContabil===0, lim=TRC.a16b.limites[tipoPJ]||0.34;
    const bMSem=Math.max(0,bM-total),tSem=bMSem*calcAliq(bMSem),ac=Math.max(0,tMB-tSem);
    const aPF=total>0?ac/total:0, aPJ=(!pend&&lucroContabil>0)?irpjCsll/lucroContabil:null;
    const soma=!pend?aPJ+aPF:null, exc=!pend&&soma>lim, dif=exc?soma-lim:0, red=exc?total*dif:0;
    return {cnpj,nome,dividendos:total,tCom:tMB,tSem,ac,aPF,aPJ,soma,lim,exc,dif,red,pend,tipoPJ,pd};
  });
}
function calcTrib(lans,m6A,pjData){
  const {bM,bB,excl,pend}=calcBase(lans),aliq=calcAliq(bM),tMB=bM*aliq;
  const incI=lans.reduce((s,l)=>TAX[l.cod]?.inc==="incI"?s+l.irrf:s,0);
  const incII=lans.reduce((s,l)=>TAX[l.cod]?.inc==="incII"&&TAX[l.cod]?.bM?s+l.irrf:s,0);
  const incIII=lans.reduce((s,l)=>TAX[l.cod]?.inc==="incIII"?s+l.irrf:s,0);
  const reds=calcRedutores(lans,bM,tMB,pjData||{}), incV=reds.reduce((s,r)=>s+r.red,0);
  const tD3=incI+incII+incIII+incV, r3=tMB-tD3, r4=Math.max(0,r3), p4=r3<0;
  const i6A=Object.values(m6A).reduce((s,m)=>s+m.iEv,0), r5=r4-i6A;
  const cL=lans.filter(l=>l.cod==="CARNE_LEAO").reduce((s,l)=>s+l.irrf,0);
  const iP=lans.reduce((s,l)=>TAX[l.cod]?.inc==="incI"?s+l.irrf:s,0);
  return {bB,bM,excl,pend,aliq,tMB,incI,incII,incIII,incV,reds,tD3,r3,r4,p4,i6A,r5,cL,iP,sDA:-(iP+cL),sDF:-(iP+cL)+r5};
}
function fullCalc(lans,pjData){return calcTrib(lans,calcMotor6A(lans),pjData);}

/* ── SNAPSHOT ───────────────────────────────── */
function criarSnapshot({lans,pjData,consultor,tipo,nota}){
  const m6A=calcMotor6A(lans),trib=calcTrib(lans,m6A,pjData);
  return {id:"snap_"+Date.now(),ts:new Date().toISOString(),consultor,versaoRegra:TRC.v,norma:TRC.norm,tipo,nota:nota||"",
    lansSnapshot:JSON.parse(JSON.stringify(lans)),pjDataSnapshot:JSON.parse(JSON.stringify(pjData||{})),
    resultado:{bB:trib.bB,bM:trib.bM,aliq:trib.aliq,tMB:trib.tMB,incI:trib.incI,incII:trib.incII,incIII:trib.incIII,incV:trib.incV,i6A:trib.i6A,r3:trib.r3,r4:trib.r4,r5:trib.r5,sDF:trib.sDF,pendencias:trib.pend.map(p=>({nome:p.nome,m:p.m})),numLancamentos:lans.length}};
}

/* ── DADOS MENSAIS ──────────────────────────── */
const MESES_PT=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
function buildMonthlyData(lans){
  const months={};
  for(let m=1;m<=12;m++){const k=`2026-${String(m).padStart(2,"0")}`;months[k]={baseMin:0,irrf6A:0,mes:m};}
  const m6A=calcMotor6A(lans);
  lans.forEach(l=>{const t=TAX[l.cod];if(!t||!t.eR||!t.bM||l.grandfathering)return;const mes=l.data.slice(0,7);if(months[mes])months[mes].baseMin+=l.valorBruto;});
  Object.values(m6A).forEach(m=>{if(months[m.mes])months[m.mes].irrf6A+=m.iEv;});
  let cum=0;
  return Object.entries(months).sort().map(([k,d])=>{cum+=d.baseMin;return {...d,k,cumBase:cum,label:MESES_PT[d.mes-1]};});
}

/* ── GRÁFICO SVG PURO (sem Recharts) ───────── */
function GraficoMensal({lans}){
  const data=useMemo(()=>buildMonthlyData(lans),[lans]);
  const totBase=data[data.length-1]?.cumBase||0;
  const totIRRF=data.reduce((s,d)=>s+d.irrf6A,0);
  const W=560, H=200, PL=52, PR=8, PT=10, PB=28;
  const cW=(W-PL-PR)/12, iW=cW*0.35;
  const maxV=Math.max(TRC.a16.lf*1.05,...data.map(d=>Math.max(d.cumBase,d.baseMin)));
  const maxI=Math.max(1,...data.map(d=>d.irrf6A));
  const yScale=v=>PT+H-PB-(v/maxV)*(H-PT-PB);
  const yScaleI=v=>PT+H-PB-(v/maxI)*(H-PT-PB)*0.4;
  const points=data.map((d,i)=>`${PL+i*cW+cW/2},${yScale(d.cumBase)}`).join(" ");
  const ticksY=[0,TRC.a16.lz,TRC.a16.lf].filter(v=>v<=maxV);
  return (
    <div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
        {[{l:"Base acumulada",v:`R$${(totBase/1000).toFixed(0)}k`},{l:"Meses c/ lançamentos",v:data.filter(d=>d.baseMin>0).length},{l:"IRRF Art. 6-A total",v:`R$${(totIRRF/1000).toFixed(0)}k`,d:totIRRF>0},{l:"Meses c/ retenção",v:data.filter(d=>d.irrf6A>0).length,d:data.some(d=>d.irrf6A>0)}].map(m=>(
          <div key={m.l} style={{background:"var(--bg2)",borderRadius:8,padding:"10px 14px",flex:1,minWidth:100}}>
            <div style={{fontSize:11,color:"var(--tx3)",marginBottom:3}}>{m.l}</div>
            <div style={{fontSize:15,fontWeight:500,color:m.d?"var(--tx-danger)":"var(--tx)"}}>{m.v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:14,marginBottom:8,flexWrap:"wrap"}}>
        {[{cor:"#185FA5",l:"Base acumulada"},{cor:"rgba(24,95,165,0.45)",l:"Base do mês"},{cor:"#E24B4A",l:"IRRF Art. 6-A"},{cor:"#EF9F27",l:"R$600k limiar"},{cor:"#E24B4A",l:"R$1,2M flat"}].map(x=>(
          <div key={x.l} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:12,height:3,borderRadius:2,background:x.cor}}/>
            <span style={{fontSize:11,color:"var(--tx3)"}}>{x.l}</span>
          </div>
        ))}
      </div>
      <div style={{background:"var(--bg2)",borderRadius:10,padding:"10px 4px 4px",overflowX:"auto"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block"}}>
          {/* grid */}
          {ticksY.map(v=>(
            <g key={v}>
              <line x1={PL} y1={yScale(v)} x2={W-PR} y2={yScale(v)} stroke={v===0?"rgba(0,0,0,0.1)":v===TRC.a16.lz?"#EF9F27":"#E24B4A"} strokeWidth={v===0?1:1} strokeDasharray={v>0?"4,4":""}/>
              <text x={PL-4} y={yScale(v)+4} textAnchor="end" fontSize="9" fill="#888780">{`R$${(v/1000).toFixed(0)}k`}</text>
              {v>0&&<text x={W-PR-2} y={yScale(v)-3} textAnchor="end" fontSize="8" fill={v===TRC.a16.lz?"#EF9F27":"#E24B4A"}>{v===TRC.a16.lz?"600k":"1,2M"}</text>}
            </g>
          ))}
          {/* barras base mês */}
          {data.map((d,i)=>(
            <rect key={"bm"+i} x={PL+i*cW+(cW-iW*2-2)/2} y={yScale(d.baseMin)} width={iW} height={Math.max(0,(H-PB)-yScale(d.baseMin))} fill="rgba(24,95,165,0.45)" rx="2"/>
          ))}
          {/* barras IRRF */}
          {data.map((d,i)=>d.irrf6A>0&&(
            <rect key={"ir"+i} x={PL+i*cW+(cW-iW*2-2)/2+iW+2} y={yScaleI(d.irrf6A)} width={iW} height={Math.max(0,(H-PB)-yScaleI(d.irrf6A))} fill="#E24B4A" rx="2"/>
          ))}
          {/* linha base acumulada */}
          <polyline points={points} fill="none" stroke="#185FA5" strokeWidth="2"/>
          {data.map((d,i)=>(
            <circle key={"pt"+i} cx={PL+i*cW+cW/2} cy={yScale(d.cumBase)} r="3" fill="#185FA5"/>
          ))}
          {/* labels eixo X */}
          {data.map((d,i)=>(
            <text key={"lx"+i} x={PL+i*cW+cW/2} y={H-4} textAnchor="middle" fontSize="9" fill="#888780">{d.label}</text>
          ))}
        </svg>
      </div>
      <div style={{marginTop:8,display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:2}}>
        {data.map(d=>{const cor=calcAliq(d.cumBase)>=0.10?"#E24B4A":calcAliq(d.cumBase)>0?"#EF9F27":"#1D9E75";return(
          <div key={d.k} style={{textAlign:"center"}}>
            <div style={{height:4,borderRadius:2,background:cor,marginBottom:2}}/>
            <div style={{fontSize:8,color:"var(--tx3)"}}>{d.label}</div>
            {d.irrf6A>0&&<div style={{fontSize:8,color:"#E24B4A"}}>⚠</div>}
          </div>
        );})}
      </div>
      <div style={{fontSize:11,color:"var(--tx3)",marginTop:4}}>Heatmap: verde = abaixo do limiar · âmbar = zona linear · vermelho = flat 10%</div>
    </div>
  );
}

function getRisco(cli){
  if(!cli.lans?.length)return{nivel:"sem_dados",score:0,label:"Sem dados",cor:"#888780",aliq:0,sDF:0,bM:0,i6A:0,pend:0};
  const t=fullCalc(cli.lans,cli.pjData||{});
  const score=t.aliq*100+t.pend.length*5,nivel=t.aliq>=0.10?"critico":t.aliq>=0.05?"alto":t.aliq>0?"moderado":"baixo";
  const labels={critico:"Crítico",alto:"Alto",moderado:"Moderado",baixo:"Abaixo do limiar"};
  const cores={critico:"#E24B4A",alto:"#EF9F27",moderado:"#BA7517",baixo:"#1D9E75"};
  return {nivel,score,label:labels[nivel],cor:cores[nivel],aliq:t.aliq,sDF:t.sDF,bM:t.bM,i6A:t.i6A,pend:t.pend.length};
}

/* ── ESPELHO FISCAL ─────────────────────────── */
function EspelhoFiscal({lans,onUpdate,pjData,onUpdatePjData,clienteNome}){

  const tabs=[{id:"resumo",l:"Resumo"},{id:"grafico",l:"Evolução mensal"},{id:"lancamentos",l:"Lançamentos"},{id:"fluxo",l:"Fluxo §§ 3–6"},{id:"redutor",l:`Redutor 16-B${trib.incV>0?" ✓":trib.reds?.some(r=>r.pend)?" ⚠":""}`}];

        <div style={C}><div style={{fontSize:11,color:"var(--tx3)",marginBottom:6}}>Termômetro da base mínima</div><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:8,borderRadius:99,background:"var(--bg2)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:99,width:`${pct}%`,background:trib.bM>=TRC.a16.lf?"#E24B4A":trib.bM>TRC.a16.lz?"#EF9F27":"#1D9E75",transition:"width .4s"}}/></div><span style={{fontSize:13,fontWeight:500,minWidth:44}}>{fmtP(trib.aliq)}</span></div><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--tx3)",marginTop:3}}><span>R$0</span><span>R$600k</span><span>R$1,2M</span></div></div>
        {trib.pend.length>0&&<div style={{...C,borderColor:"var(--br-warn)",background:"var(--bg-warn)"}}><div style={{fontSize:12,fontWeight:500,color:"var(--tx-warn)",marginBottom:6}}>Pendências ({trib.pend.length})</div>{trib.pend.map((p,i)=><div key={i} style={{fontSize:12,color:"var(--tx-warn)",marginBottom:2}}>· {p.nome}: {p.m}</div>)}</div>}
        {lans.length===0&&<div style={{...C,textAlign:"center",padding:24,background:"var(--bg2)"}}><div style={s0}>Nenhum lançamento cadastrado.</div><button onClick={()=>setSub("lancamentos")} style={{marginTop:8,fontSize:12,padding:"5px 14px",borderRadius:8,background:"var(--bg-info)",color:"var(--tx-info)",border:"0.5px solid var(--br-info)",cursor:"pointer",display:"block",margin:"8px auto 0"}}>Adicionar primeiro lançamento</button></div>}
      </div>}

      {sub==="fluxo"&&<div>
        <div style={C}><RL l="Base bruta de rendimentos" v={fmt(trib.bB)}/>{trib.excl.map((e,i)=><RL key={i} l={`(-) ${e.m}`} v={`- ${fmt(e.v)}`} ind/>)}<RL l={`= Base da tributação mínima — ${trib.excl.length} exclusão(ões)`} v={fmt(trib.bM)} bold/><RL l={`Alíquota — ${trib.bM>=TRC.a16.lf?"flat 10%":trib.bM<=TRC.a16.lz?"0%":"linear"}`} v={fmtP(trib.aliq)}/><RL l="= Tributação mínima bruta (§ 2º)" v={fmt(trib.tMB)} bold/></div>
        <div style={C}><div style={{fontSize:11,color:"var(--tx3)",marginBottom:4}}>Deduções § 3º</div><RL l="Inc. I — IRRF progressivo retido (estimado)*" v={`- ${fmt(trib.incI)}`} ind/><RL l="Inc. II — IRRF exclusivo/definitivo na base" v={`- ${fmt(trib.incII)}`} ind/><RL l="Inc. III — IR Lei 14.754/2023" v={`- ${fmt(trib.incIII)}`} ind/><RL l={`Inc. V — Redutor Art. 16-B${trib.incV>0?" (aplicado)":trib.reds?.some(r=>r.pend)?" (⚠ pendente)":" (não aplicável)"}`} v={`- ${fmt(trib.incV)}`} ind ok={trib.incV>0}/><RL l={`§ 4º — ${trib.p4?"negativo → zero (continua ao § 5º)":"positivo, sem alteração"}`} v={fmt(trib.r4)} bold/></div>

      </div>}
      {sub==="redutor"&&<div>
        {!(trib.reds?.length)?<div style={{...C,textAlign:"center",padding:28,color:"var(--tx3)"}}>Adicione DIV_FECHADA ou DIV_ABERTA para habilitar o Redutor Art. 16-B.</div>
        :trib.reds.map(r=>(
          <div key={r.cnpj} style={{...C,borderLeft:`3px solid ${r.pend?"var(--br-warn)":r.red>0?"#1D9E75":"var(--br)"}`,borderRadius:"0 12px 12px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>

              <div style={{display:"flex",gap:6}}><span style={{fontSize:11,padding:"2px 10px",borderRadius:99,background:r.pend?"var(--bg-warn)":r.red>0?"var(--bg-ok)":"var(--bg2)",color:r.pend?"var(--tx-warn)":r.red>0?"var(--tx-ok)":"var(--tx2)",fontWeight:500}}>{r.pend?"Pendente":r.red>0?"Redutor aplicado":"Sem excesso"}</span><button onClick={()=>editCnpj===r.cnpj?setEditCnpj(null):startEdit(r)} style={{fontSize:11,padding:"3px 10px",borderRadius:6,border:"0.5px solid var(--br2)",background:"transparent",color:"var(--tx2)",cursor:"pointer"}}>{editCnpj===r.cnpj?"Cancelar":"Editar PJ"}</button></div>
            </div>
            {editCnpj===r.cnpj&&<div style={{background:"var(--bg2)",borderRadius:10,padding:14,marginBottom:12}}><div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>{[{l:"IRPJ + CSLL (R$)",k:"irpjCsll"},{l:"Lucro contábil (R$)",k:"lucroContabil"}].map(fld=><div key={fld.k} style={{display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:150}}><label style={{fontSize:11,color:"var(--tx3)"}}>{fld.l}</label><input type="number" value={ef[fld.k]} onChange={e=>setEf(p=>({...p,[fld.k]:e.target.value}))} style={{...i0,width:"100%"}}/></div>)}<div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:11,color:"var(--tx3)"}}>Tipo da PJ</label><select value={ef.tipoPJ} onChange={e=>setEf(p=>({...p,tipoPJ:e.target.value}))} style={i0}>{Object.entries(TRC.a16b.tipoLabels).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div></div><button onClick={()=>salvarPJ(r.cnpj)} style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:500,background:"var(--bg-info)",color:"var(--tx-info)",border:"0.5px solid var(--br-info)",cursor:"pointer"}}>Salvar</button></div>}

            {r.pend&&<div style={{padding:"10px 14px",background:"var(--bg-warn)",borderRadius:8,fontSize:12,color:"var(--tx-warn)"}}>Informe IRPJ+CSLL e Lucro Contábil. Art. 16-B § 4º: exige demonstrações financeiras.</div>}

    </div>
  );

/* ── SIMULADOR ──────────────────────────────── */
function Simulador({baseLans,cens,onUpdateCens,clienteNome,pjData}){
  const [modo,setModo]=useState("list"),[selCen,setSelCen]=useState(null),[bNome,setBNome]=useState(""),[bDesc,setBDesc]=useState(""),[bLans,setBLans]=useState([]),[editId,setEditId]=useState(null);
  const bT=useMemo(()=>fullCalc(baseLans,pjData),[baseLans,pjData]);
  function openBuilder(cen=null){setEditId(cen?cen.id:null);setBNome(cen?cen.nome:"");setBDesc(cen?cen.desc:"");setBLans(cen?[...cen.lans]:baseLans.map(l=>({...l,id:"c_"+l.id})));setModo("builder");}
  function salvar(){if(!bNome)return;const novo={id:editId||"s_"+Date.now(),nome:bNome,desc:bDesc,criadoEm:TODAY,lans:bLans};onUpdateCens(editId?cens.map(c=>c.id===editId?novo:c):[...cens,novo]);setModo("list");}
  if(modo==="builder")return(<div><button onClick={()=>setModo("list")} style={{fontSize:12,color:"var(--tx2)",border:"none",background:"none",cursor:"pointer",marginBottom:14,padding:0}}>← Cancelar</button><div style={{fontSize:14,fontWeight:500,marginBottom:14}}>{editId?"Editar":"Novo"} cenário</div><div style={C}><div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}><div style={{display:"flex",flexDirection:"column",gap:4,flex:1}}><label style={{fontSize:11,color:"var(--tx3)"}}>Nome *</label><input value={bNome} onChange={e=>setBNome(e.target.value)} style={{...i0,width:"100%"}}/></div><div style={{display:"flex",flexDirection:"column",gap:4,flex:2}}><label style={{fontSize:11,color:"var(--tx3)"}}>Descrição / premissas</label><input value={bDesc} onChange={e=>setBDesc(e.target.value)} style={{...i0,width:"100%"}}/></div></div><button onClick={salvar} disabled={!bNome} style={{padding:"7px 18px",borderRadius:8,fontSize:13,fontWeight:500,background:bNome?"var(--bg-info)":"var(--bg2)",color:bNome?"var(--tx-info)":"var(--tx3)",border:`0.5px solid ${bNome?"var(--br-info)":"var(--br)"}`,cursor:bNome?"pointer":"default"}}>{editId?"Salvar":"Criar cenário"}</button></div><LanEditor lans={bLans} onUpdate={setBLans}/></div>);
  if(modo==="compare"&&selCen){
    const cT=fullCalc(selCen.lans,pjData);
    const rows=[{l:"Rendimentos brutos",bv:bT.bB,cv:cT.bB},{l:"Base trib. mínima",bv:bT.bM,cv:cT.bM},{l:"Alíquota",bv:bT.aliq,cv:cT.aliq,pct:true,lB:true},{l:"Trib. mínima bruta",bv:bT.tMB,cv:cT.tMB,lB:true},{l:"Redutor 16-B",bv:bT.incV,cv:cT.incV,lB:true},{l:"IRRF Art. 6º-A",bv:bT.i6A,cv:cT.i6A,lB:true,dest:true},{l:"Saldo DAA estimado",bv:bT.sDF,cv:cT.sDF,lB:true,dest:true}];
    function dif(bv,cv,pct,lB){const d=cv-bv;if(Math.abs(d)<0.01)return{txt:"—",cor:"var(--tx3)"};return{txt:pct?(d>=0?"+":"")+((d)*100).toFixed(2)+"p.p.":(d>=0?"+":"")+fmt(cv-bv),cor:lB?(d<0?"var(--tx-ok)":"var(--tx-danger)"):"var(--tx)"};}
    return(<div><button onClick={()=>setModo("list")} style={{fontSize:12,color:"var(--tx2)",border:"none",background:"none",cursor:"pointer",marginBottom:14,padding:0}}>← Voltar</button><div style={{fontSize:14,fontWeight:500,marginBottom:12}}>Cenário Base × {selCen.nome}</div><div style={{...C,overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{borderBottom:"0.5px solid var(--br)"}}>{["Métrica","Base","Cenário","Diferença est."].map((h,i)=><th key={i} style={{textAlign:i===0?"left":"right",padding:"8px 12px",fontWeight:500,fontSize:11,color:"var(--tx3)"}}>{h}</th>)}</tr></thead><tbody>{rows.map((r,i)=>{const d=dif(r.bv,r.cv,r.pct,r.lB);return <tr key={i} style={{borderBottom:"0.5px solid var(--br)",background:r.dest?"var(--bg2)":"transparent"}}><td style={{padding:"8px 12px",fontWeight:r.dest?500:400}}>{r.l}</td><td style={{padding:"8px 12px",textAlign:"right",fontFamily:"monospace"}}>{r.pct?fmtP(r.bv):fmt(r.bv)}</td><td style={{padding:"8px 12px",textAlign:"right",fontFamily:"monospace"}}>{r.pct?fmtP(r.cv):fmt(r.cv)}</td><td style={{padding:"8px 12px",textAlign:"right",fontWeight:500,color:d.cor,fontFamily:"monospace"}}>{d.txt}</td></tr>;})}</tbody></table></div>{bT.bM===cT.bM&&<div style={{...C,background:"var(--bg-info)",borderColor:"var(--br-info)"}}><div style={{fontSize:12,fontWeight:500,color:"var(--tx-info)",marginBottom:4}}>Carga anual estimada idêntica</div><div style={{fontSize:12,color:"var(--tx-info)"}}>Diferença de IRRF Art. 6-A é apenas de fluxo de caixa, sem benefício fiscal anual real.</div></div>}<div style={{...C,borderColor:"var(--br-danger)",background:"var(--bg-danger)"}}><div style={{fontSize:12,color:"var(--tx-danger)"}}>Diferença estimada · não constitui recomendação de investimento · pendências podem alterar o resultado.</div></div></div>);
  }
  return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div><div style={{fontSize:14,fontWeight:500}}>Simulador de cenários — {clienteNome}</div><div style={{fontSize:12,color:"var(--tx3)",marginTop:2}}>Diferenças estimadas · sem prescrição de conduta</div></div><button onClick={()=>openBuilder()} style={{padding:"6px 16px",borderRadius:8,fontSize:13,fontWeight:500,background:"var(--bg-info)",color:"var(--tx-info)",border:"0.5px solid var(--br-info)",cursor:"pointer",flexShrink:0}}>+ Novo cenário</button></div>
    <div style={C}><div style={{fontSize:12,fontWeight:500,marginBottom:10}}>Cenário base</div><div style={{display:"flex",gap:10,flexWrap:"wrap"}}><MC2 label="Base mínima" value={fmt(bT.bM)}/><MC2 label="IRRF Art. 6-A" value={fmt(bT.i6A)} danger={bT.i6A>0}/><MC2 label="Redutor 16-B" value={fmt(bT.incV)} ok={bT.incV>0}/><MC2 label="Saldo DAA est." value={fmt(bT.sDF)} danger={bT.sDF>0} ok={bT.sDF<0}/></div></div>
    {cens.length===0&&<div style={{...C,textAlign:"center",padding:28,background:"var(--bg2)"}}><div style={s0}>Nenhum cenário salvo. Crie para explorar o impacto fiscal estimado.</div></div>}

ht:500,color:netSame?"var(--tx-info)":"var(--tx-warn)"}}>{netSame?"Nulo (só fluxo)":"Verificar"}</div></div></div></div>);})}

          {cur.id==="pendencias"&&<div><div style={{fontSize:10,letterSpacing:"0.08em",textTransform:"uppercase",color:"#888780",marginBottom:14}}>Pendências</div>{trib.pend.map((p,i)=><div key={i} style={{display:"flex",gap:14,padding:"16px",background:"#faeeda",borderRadius:10,marginBottom:10,border:"0.5px solid #fac775"}}><div style={{width:28,height:28,borderRadius:"50%",background:"#fac775",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:500,color:"#633806",flexShrink:0}}>{i+1}</div><div><div style={{fontSize:14,fontWeight:500,color:"#633806",marginBottom:4}}>{p.nome}</div><div style={{fontSize:12,color:"#854f0b"}}>{p.m}</div></div></div>)}</div>}

                  <td style={{padding:"10px 12px",textAlign:"center",color:"var(--tx3)"}}>{(c.cens||[]).length}</td>
                  <td style={{padding:"10px 12px",textAlign:"center",color:"var(--tx3)"}}>{(c.snapshots||[]).length}</td>
                  <td style={{padding:"10px 12px",whiteSpace:"nowrap",color:"var(--tx3)"}}>{fmtD(c.ultApres)}</td>
                  <td style={{padding:"10px 12px",whiteSpace:"nowrap",color:c.proxFup&&c.proxFup<=TODAY?"var(--tx-danger)":"var(--tx2)"}}>{fmtD(c.proxFup)}</td>
                  <td style={{padding:"10px 12px",color:"var(--tx-info)",fontSize:14}}>→</td>
                </tr>
              ))}
              {fil.length===0&&<tr><td colSpan={10} style={{padding:"28px",textAlign:"center",color:"var(--tx3)"}}>Nenhum cliente encontrado.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
